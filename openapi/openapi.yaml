openapi: 3.0.3
info:
  title: ICD-11 API
  description: A professional API-first service for searching and retrieving ICD medical codes.
  version: 1.0.0
servers:
  - url: http://localhost:8080/v1
    description: Local development server

paths:
  /icd10:
    get:
      summary: Get sample of ICD codes
      operationId: GetIcd10
      responses:
        '200':
          description: A list of codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ICDCode'

  /search:
    get:
      summary: Search for ICD codes
      operationId: SearchCodes
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ICDCode'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ICDCode:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        version:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
