openapi: 3.0.3
info:
  title: ICD Codes API
  description: A high-performance interface for searching and retrieving medical classifications.
  version: 1.0.0
servers:
  - url: http://localhost:8080/v1
    description: Local development server

paths:
  /icd10:
    get:
      summary: Retrieve all ICD-10 codes
      operationId: getIcd10
      responses:
        '200':
          description: A list of ICD-10 codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ICDCodeResponse'
  /search:
    get:
      summary: Search for diagnosis codes
      operationId: searchCodes
      parameters:
        - name: q
          in: query
          description: The search term (code or description)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of matched ICD codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ICDCodeResponse'

components:
  schemas:
    ICDCodeResponse:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: string
          example: "A00"
        description:
          type: string
          example: "Cholera"
